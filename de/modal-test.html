<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Modal 组件测试</title>
  <script src="../component/index.js"></script>
  <style>
    :root {
      --lf-paper: #fffefb;
      --lf-grid-unit: 20px;
      --lf-grid-line: rgba(178, 186, 200, 0.42);
      --lf-grid-line-bold: rgba(158, 168, 184, 0.58);
      --lf-ink: #0f172a;
      --lf-font: "Inter", "Microsoft YaHei", "PingFang SC", sans-serif;
      --lf-body-size: 24px;
      --lf-line-height: 1.58;
    }

    body {
      margin: 0;
      padding: 40px;
      font-family: var(--lf-font);
      font-size: var(--lf-body-size);
      line-height: var(--lf-line-height);
      color: var(--lf-ink);
      background-color: var(--lf-paper);
      background-image:
        linear-gradient(var(--lf-grid-line) 1px, transparent 1px),
        linear-gradient(90deg, var(--lf-grid-line) 1px, transparent 1px),
        linear-gradient(var(--lf-grid-line-bold) 1px, transparent 1px),
        linear-gradient(90deg, var(--lf-grid-line-bold) 1px, transparent 1px);
      background-size:
        var(--lf-grid-unit) var(--lf-grid-unit),
        var(--lf-grid-unit) var(--lf-grid-unit),
        calc(var(--lf-grid-unit) * 5) calc(var(--lf-grid-unit) * 5),
        calc(var(--lf-grid-unit) * 5) calc(var(--lf-grid-unit) * 5);
    }
    h1 { font-size: 32px; font-weight: 800; margin: 0 0 16px; }
    p { margin: 0 0 12px; }
    .lesson-stage {
      max-width: 900px;
      padding: 28px 32px;
      border-radius: 20px;
      background: rgba(255, 255, 255, 0.54);
      box-shadow: 0 0 0 1px rgba(15, 23, 42, 0.08);
    }
    .lesson-stage strong {
      color: var(--lf-ink);
    }
    .controls {
      display: flex;
      gap: 12px;
      margin: 24px 0;
    }
    .controls button {
      padding: 8px 18px;
      border: 2px solid #0f172a;
      border-radius: 8px;
      background: #fff;
      font-size: 18px;
      cursor: pointer;
      box-shadow: 2px 3px 0 rgba(15,23,42,0.22);
    }
    .controls button:hover { background: #f8f8f6; }
    .log {
      margin-top: 24px;
      padding: 16px;
      border: 1px dashed rgba(178,186,200,0.6);
      border-radius: 8px;
      background: rgba(15,23,42,0.02);
      font-size: 16px;
      line-height: 1.6;
      max-height: 200px;
      overflow-y: auto;
    }
    .log-entry { margin: 2px 0; }
    .log-entry .time { color: #64748b; }
  </style>
</head>
<body>
  <div class="lesson-stage">
    <h1>排列组合：密码锁问题</h1>
    <p>我们正在讲解“一个位置有几种选择，多个位置就按位置依次相乘”的思路。</p>
    <p>在进入三位数密码锁之前，先停一下，让学生口答一个更小的问题，确认他们理解“一位密码”的选择数。</p>
    <p><strong>弹窗定位：</strong>它不是跳出课堂的新模块，而是讲解中的短暂停顿和互动确认。</p>
  </div>

  <div class="controls">
    <button id="btn-show">show() — 出现悬浮框</button>
    <button id="btn-expand">expand() — 直接展开</button>
    <button id="btn-hide">hide() — 隐藏</button>
    <button id="btn-destroy">destroy() — 销毁</button>
  </div>

  <div class="log" id="log"></div>

  <script>
    var logEl = document.getElementById('log')
    function log(msg) {
      var entry = document.createElement('div')
      entry.className = 'log-entry'
      var now = new Date()
      var time = [now.getHours(), now.getMinutes(), now.getSeconds()]
        .map(function (n) { return n < 10 ? '0' + n : n }).join(':')
      entry.innerHTML = '<span class="time">[' + time + ']</span> ' + msg
      logEl.appendChild(entry)
      logEl.scrollTop = logEl.scrollHeight
    }

    var modal = AIClassComponent.createModal({
      title: '口答互动',
      icon: '口答',
      width: 500,
      height: 620,
      x: 660,
      y: 30,
      minScale: 0.78,
      maxScale: 1.04,
      html: ''
        + '<section class="aic-interaction-card">'
        + '  <div class="aic-interaction-kicker">互动题 · 口答</div>'
        + '  <p class="aic-interaction-question">为了解决这个问题，我们先来思考一个更简单的问题：如果我的密码锁只有一位数，并且密码是 1、2、3、4、5 中的一个数字，那么我能设置多少种不同的密码？</p>'
        + '  <div class="aic-interaction-answer">'
        + '    <div class="aic-interaction-input">学生口答：5</div>'
        + '    <button class="aic-interaction-submit" type="button">判定</button>'
        + '  </div>'
        + '  <div class="aic-interaction-feedback"><strong>正确反馈：</strong>很好！一位数密码只有 1 个位置，这个位置可以放 1、2、3、4、5 中的任意一个数字，所以一共有 5 种可能。</div>'
        + '  <div class="aic-interaction-history"><strong>历史记录：</strong>一位数密码有 5 种选法。</div>'
        + '</section>',
      onShow: function () { log('🟢 onShow — 弹窗展开') },
      onHide: function () { log('🔴 onHide — 弹窗关闭') },
      onClose: function () { log('🟡 onClose — 关闭按钮点击') }
    })

    document.body.appendChild(modal.el)
    log('组件已创建，初始状态：' + modal.getState())

    document.getElementById('btn-show').addEventListener('click', function () {
      modal.show()
      log('调用 show() → 状态：' + modal.getState())
    })

    document.getElementById('btn-expand').addEventListener('click', function () {
      modal.expand()
      log('调用 expand() → 状态：' + modal.getState())
    })

    document.getElementById('btn-hide').addEventListener('click', function () {
      modal.hide()
      log('调用 hide() → 状态：' + modal.getState())
    })

    document.getElementById('btn-destroy').addEventListener('click', function () {
      modal.destroy()
      log('调用 destroy() — 组件已销毁')
    })

    log('请点击上方按钮或右侧悬浮图标测试')
  </script>
</body>
</html>
